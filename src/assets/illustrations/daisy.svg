    <ellipse cx="60" cy="32" rx="7" ry="13" />
    <ellipse cx="60" cy="32" rx="7" ry="13" transform="rotate(45 60 50)" />
    <ellipse cx="60" cy="32" rx="7" ry="13" transform="rotate(90 60 50)" />
    <ellipse cx="60" cy="32" rx="7" ry="13" transform="rotate(135 60 50)" />
    <ellipse cx="60" cy="32" rx="7" ry="13" transform="rotate(180 60 50)" />
    <ellipse cx="60" cy="32" rx="7" ry="13" transform="rotate(225 60 50)" />
    <ellipse cx="60" cy="32" rx="7" ry="13" transform="rotate(270 60 50)" />
    <ellipse cx="60" cy="32" rx="7" ry="13" transform="rotate(315 60 50)" />
  </g>
  <!-- pistil -->
  <circle cx="60" cy="50" r="7" fill="oklch(0.72 0.08 70)" stroke="oklch(0.45 0.07 145)" stroke-width="1.5" />
