  <path d="M60 105 Q62 85 60 60" stroke="oklch(0.45 0.07 145)" stroke-width="2" />
  <path d="M60 88 Q48 82 42 88" stroke="oklch(0.45 0.07 145)" stroke-width="2" fill="oklch(0.82 0.06 145)" />
  <path d="M60 78 Q72 72 78 78" stroke="oklch(0.45 0.07 145)" stroke-width="2" fill="oklch(0.82 0.06 145)" />
